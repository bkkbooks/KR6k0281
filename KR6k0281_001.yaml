body:
  text: 甲戌九月補題弘一化總一初十界說處二三賢說處此是上下二卷總科三十禪說處將釋一時處四十地說處此經二機根五十金剛說處七門三藏攝六十忍說處分別四翻譯初敘下天次第七十願說處五宗趣初本師說八心地說處六題名初總序二明說法會處九總準結七本文記卷三第初降魔二頁起初報恩二下生二化傳說三出家成道二別化初傳內門行二別釋四轉法輪初略舉十處二說經緣起誡惡行門二傳發心外門戒初開序初時處初略舉上天次第第五頁後半起二下天復說由二勸策初策發初歎戒德科表排竣續得大師舊稿內題十六年丁卯春住杭二歎受器州雲居山常寂光寺編録二十二年癸酉九月手裝三勸示生後時住晉水尊勝禪院案舊稿總科二化傳說以下為一二勸信初標章述意冊重戒一冊輕戒一冊新稿不分冊並與菩薩自此已下二旁述三門初標列戒本宗要科表合冊大藏經會謹識釋戒本文二正明初受得門二護持門三犯失門三結戒序三指餘二正說三流通初牒經配科三牒文解釋初標分二釋經總意三略釋經文二牒釋初受得門初應成機初泛學解語有情初舉心相初正明菩薩分受二局被發菩提心二引文證二簡異比丘總受二受得法初二種受戒初標分初一分受三總明二受不同初明比丘總受意二正明二全分受二明菩薩分受意初歷劫修滿故二護持門初標列二三聚誓願初總標初正明初攝律儀戒二無德不攝故二隨釋二別解二釋疑二攝善法戒三明大小勝劣意一三舉德三饒益有情戒初九門世俗戒護初隨心一門一分持初立義初法二引證二喻二下八門全分持三結初簡前標章初引論簡前初簡前標章三二標章述意二二引論證成初隨性門局出家二引文證成初遍舉一門專念護持三總結護持四初簡前標章初引文初利生通局二隱密門通道俗二引文證成二對簡五初簡前標章初引論簡前二貪瞋差別初順勝門堅禁勝瞋二引文證成二標章述意二三下七門有緣開制六初簡前標章初引論簡前二意樂門勝瞋亦開二引文證成二標章述意七初引經簡前四門三護法緩急初怖畏自利謹護二標章述怖畏意十八初引經簡前二究竟門出世戒護初簡前九門標章初引經簡前二成勝門作善放止二標章述意初引論簡前二標章述意九初簡前標章二標章述意二引般若經證成三護障門永禁自利二引文證成初引經文三犯失門初標章初正明二解釋意趣二釋義初明無無餘犯二引證初引文初明有心不捨初陳法二述意二明心盡戒盡二舉喻二明犯重捨否初標列二別釋初正明初上纏失戒二中下不失二引證初證上纏失戒三明失戒重受二證中下不失化總二初牒經標章初釋上句初正明二牒釋初傳誦本師門初顯主尊勝門初現身本末門初他受用身二隨文解釋二斥非初立義初牒經標章二釋下句初成所居士解二引文二淨土化身二隨文略釋二破所坐華解初直斥三引文成土義二引文初正立自義四引有難解釋初總難二旁破有義五結所居士解二別解三總彰不異六因決蓮為座三穢土化身初牒經標章初釋所牒經初釋下句二隨文釋義二因總結前二釋上句初問四舉淨穢土初牒經標章二答二隨文釋義二說法本末門初牒經標章初釋初三句二釋聽下一句初喻最極𣵀槃二隨文釋義三釋甘下一句二喻所詮戒四釋是下五句初總釋五句初本身為本師二讚戒功能門初牒經標章二別釋本師二戒法為本師二隨文解釋初釋上二句初性遮合釋初性遮喻日月二末主顯揚門初牒經標列二釋下二句二性遮喻莊嚴二隨文釋義初展轉開化門初標二性遮別釋初性戒喻日月初以別出非釋二釋二遮戒喻莊嚴二以順解脫釋二所成戒相門初牒經標章三總述二喻意二隨文釋義初釋第二句初約三律儀簡初翻語二釋第三句二翻梵為漢語二釋義三釋大下五句初述文意初引文三能受有情門初牒經標章二引文證二釋心二隨文釋義初釋二句初正釋二釋衆下二句二問答初問三釋位下一句二答四釋真下一句初正明四點開許廣說門二引證初略頌牒經點文二指廣三結戒序初牒經標列初說時二隨文解釋初經家序初釋初坐頓結初釋文二教主三說處二徵釋初徵問初正明二釋通二簡餘三結時三結宗二釋孝為戒制初泛明孝順初孝順二正明戒制二恩所三釋放光招衆二佛序初牒經標分初標列合文二隨文釋義初師初明本末二師誦二標半月誦初明半月誦二明口放光因緣三別釋末師二引證誦意二法初牒經標章二隨文釋義初釋光光二釋非青黃等三釋非色非心四釋非有非無五釋非因果法初諸佛六釋佛等根本初明為根本二菩薩三弟子初牒經標章二釋結勸三時衆二隨文釋義初釋比丘初斥古義二立自義二釋十八梵初合數二徵釋初引徵二有釋初言總意別二別有十八三據實成佛三釋黃門等初明共不共初通受二別受初正明二引有問答二會論四釋第一清淨化總三初配文舉旁義初配文二正說初牒文總分初重戒二旁義初一句配三業二隨文釋義二輕戒二二句配三毒初舉數異說初略頌三情非情初以制配業初總標初牒文科分二配業毒等二長行初配釋三業二揀非戒業二隨文釋義初舉數制持二配釋三毒初總標二別配初七戒單配初通明三戒三配情非情二三戒通配二別會讚毀三配自作教他等初偈頌初正釋初自造他境初總標初自殺二別誦二結前釋本文二長行二問答二他造他境二別明二自淫二示相勸持初釋示相三自造自境三總結三自慳初別明世俗門初快意殺生戒二釋勸持四他造自境四自瞋二劫盜人物戒五自謗二結指勝義門三無慈行欲戒四故心妄語戒五酤酒生